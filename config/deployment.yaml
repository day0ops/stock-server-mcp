apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-server-mcp
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/managed-by: agentgateway-demo
    agentgateway.dev/feature: stock-server-mcp
    app: stock-server-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stock-server-mcp
  template:
    metadata:
      labels:
        app: stock-server-mcp
    spec:
      serviceAccountName: stock-server-mcp
      containers:
        - name: server
          image: stock-server-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '200m'
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
